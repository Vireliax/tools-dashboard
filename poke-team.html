<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Team Builder — Synergy &amp; Coverage Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #07080F;
            --surface: #0E1020;
            --surface2: #141729;
            --surface3: #1C2038;
            --border: rgba(90, 110, 255, 0.13);
            --border-focus: rgba(90, 110, 255, 0.40);
            --text-1: #E8EAF6;
            --text-2: #8890BB;
            --text-3: #4F566E;
            --accent: #5A6EFF;
            --accent-dim: rgba(90, 110, 255, 0.15);
            --good: #3DFFA8;
            --good-dim: rgba(61, 255, 168, 0.10);
            --good-border: rgba(61, 255, 168, 0.22);
            --warn: #FF9B4E;
            --warn-dim: rgba(255, 155, 78, 0.10);
            --warn-border: rgba(255, 155, 78, 0.22);
            --danger: #FF4F6B;
            --danger-dim: rgba(255, 79, 107, 0.10);
            --danger-border: rgba(255, 79, 107, 0.22);
            --immune: #A87FFF;
            --immune-dim: rgba(168, 127, 255, 0.10);
            --immune-border: rgba(168, 127, 255, 0.22);
            --radius-lg: 14px;
            --radius-md: 10px;
            --radius-sm: 7px;
            --radius-xs: 5px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
            --shadow-sm: 0 2px 14px rgba(0, 0, 0, 0.35);
            --t: 180ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #EDF0FA;
            --surface: #FFFFFF;
            --surface2: #F3F5FD;
            --surface3: #E8ECFB;
            --border: rgba(90, 110, 255, 0.12);
            --border-focus: rgba(90, 110, 255, 0.38);
            --text-1: #111428;
            --text-2: #4F566E;
            --text-3: #9097B8;
            --shadow: 0 8px 32px rgba(0, 0, 30, 0.09);
            --shadow-sm: 0 2px 14px rgba(0, 0, 30, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
            line-height: 1.55;
            transition: background var(--t), color var(--t);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 10%, rgba(90, 110, 255, 0.055) 0%, transparent 65%),
                radial-gradient(ellipse 55% 45% at 85% 90%, rgba(61, 255, 168, 0.035) 0%, transparent 65%);
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 22px;
            position: relative;
            z-index: 1
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(7, 8, 15, 0.82);
            backdrop-filter: blur(22px) saturate(1.6);
            border-bottom: 1px solid var(--border);
            transition: background var(--t);
        }

        [data-theme="light"] .header {
            background: rgba(237, 240, 250, 0.88)
        }

        .header-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .brand-logo {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--accent) 0%, #8B5FFF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .brand-text h1 {
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: -.3px;
            line-height: 1.2
        }

        .brand-text p {
            font-size: 11px;
            color: var(--text-3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .9px
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap
        }

        .api-pill {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            border: 1px solid var(--border);
            color: var(--text-3);
            background: var(--surface2);
        }

        .api-pill.loading {
            color: var(--warn);
            border-color: var(--warn-border)
        }

        .api-pill.ready {
            color: var(--good);
            border-color: var(--good-border)
        }

        .api-pill.error {
            color: var(--danger);
            border-color: var(--danger-border)
        }

        .icon-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 6px 13px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            color: var(--text-2);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all var(--t);
            white-space: nowrap;
        }

        .icon-btn:hover {
            background: var(--surface3);
            color: var(--text-1)
        }

        /* LAYOUT TOGGLE */
        .layout-toggle {
            display: flex;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .lt-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 10px;
            color: var(--text-3);
            transition: all var(--t);
            display: flex;
            align-items: center;
        }

        .lt-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor
        }

        .lt-btn:hover {
            color: var(--text-1)
        }

        .lt-btn.active {
            background: var(--accent-dim);
            color: var(--accent)
        }

        /* MAIN */
        main {
            padding: 28px 0 72px
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .section-label {
            font-family: 'Syne', sans-serif;
            font-size: 11.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.6px;
            color: var(--text-2);
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .section-label::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 15px;
            background: var(--accent);
            border-radius: 2px;
        }

        .section-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap
        }

        .team-count {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--text-3)
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            padding: 5px 13px;
            font-size: 11.5px;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            color: var(--text-3);
            cursor: pointer;
            transition: all var(--t);
        }

        .btn-ghost:hover {
            border-color: var(--danger-border);
            color: var(--danger)
        }

        .btn-save {
            background: var(--accent-dim);
            border: 1px solid rgba(90, 110, 255, 0.3);
            border-radius: var(--radius-xs);
            padding: 5px 12px;
            font-size: 11.5px;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
            transition: all var(--t);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-save:hover {
            background: var(--accent);
            color: #fff
        }

        .btn-save:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            pointer-events: none
        }

        /* TEAM GRID — GRID MODE */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 30px;
        }

        @media(max-width:820px) {
            .team-grid:not(.layout-list) {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        @media(max-width:500px) {
            .team-grid:not(.layout-list) {
                grid-template-columns: 1fr
            }
        }

        /* TEAM GRID — LIST MODE */
        .team-grid.layout-list {
            grid-template-columns: 1fr;
            gap: 8px
        }

        .team-grid.layout-list .poke-slot {
            display: flex;
            flex-direction: row;
            min-height: 88px
        }

        .team-grid.layout-list .sprite-area {
            width: 88px;
            min-width: 88px;
            height: auto;
            border-radius: var(--radius-lg) 0 0 var(--radius-lg);
            flex-shrink: 0;
        }

        .team-grid.layout-list .poke-sprite {
            width: 68px;
            height: 68px
        }

        .team-grid.layout-list .sprite-ring {
            width: 74px;
            height: 74px
        }

        .team-grid.layout-list .slot-body {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 16px;
            flex-wrap: wrap;
        }

        .team-grid.layout-list .slot-main-info {
            min-width: 150px;
            flex: 1
        }

        .team-grid.layout-list .slot-search-col {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-start;
        }

        .team-grid.layout-list .slot-actions {
            margin-top: 0
        }

        .team-grid.layout-list .poke-slot:hover {
            transform: translateX(3px) translateY(0)
        }

        .team-grid.layout-list .poke-slot:hover .poke-sprite {
            transform: scale(1.08)
        }

        /* SLOT CARD */
        .poke-slot {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: visible;
            transition: border-color var(--t), transform var(--t), box-shadow var(--t);
            position: relative;
            animation: slideUp 320ms ease both;
        }

        .poke-slot:nth-child(1) {
            animation-delay: 0ms
        }

        .poke-slot:nth-child(2) {
            animation-delay: 55ms
        }

        .poke-slot:nth-child(3) {
            animation-delay: 110ms
        }

        .poke-slot:nth-child(4) {
            animation-delay: 165ms
        }

        .poke-slot:nth-child(5) {
            animation-delay: 220ms
        }

        .poke-slot:nth-child(6) {
            animation-delay: 275ms
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .poke-slot.filled {
            border-color: var(--border-focus)
        }

        .poke-slot:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: rgba(90, 110, 255, 0.35)
        }

        /* SPRITE AREA */
        .sprite-area {
            background: var(--surface2);
            height: 145px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .sprite-area::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 60%, rgba(90, 110, 255, 0.08) 0%, transparent 65%);
        }

        .sprite-ring {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 1px solid var(--border);
            opacity: 0.5;
        }

        .poke-sprite {
            width: 108px;
            height: 108px;
            object-fit: contain;
            position: relative;
            z-index: 1;
            image-rendering: pixelated;
            transition: transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.45));
        }

        .poke-slot.filled .poke-sprite {
            image-rendering: auto
        }

        .poke-slot:hover .poke-sprite {
            transform: scale(1.1) translateY(-5px)
        }

        .slot-empty-icon {
            font-size: 36px;
            opacity: 0.13;
            position: relative;
            z-index: 1
        }

        .slot-loading-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: rgba(7, 8, 15, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        [data-theme="light"] .slot-loading-overlay {
            background: rgba(237, 240, 250, 0.6)
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* SLOT BODY (GRID) */
        .slot-body {
            padding: 13px 14px 14px
        }

        .slot-num {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-3);
            margin-bottom: 5px
        }

        .slot-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 7px;
            min-height: 22px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .slot-types {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 11px;
            min-height: 22px
        }

        .type-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 9px;
            border-radius: 100px;
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.35);
        }

        /* SEARCH */
        .search-wrap {
            position: relative
        }

        .search-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 32px 8px 10px;
            font-size: 12px;
            font-family: 'Manrope', sans-serif;
            font-weight: 500;
            color: var(--text-1);
            outline: none;
            transition: border-color var(--t), background var(--t);
        }

        .search-input::placeholder {
            color: var(--text-3)
        }

        .search-input:focus {
            border-color: var(--border-focus);
            background: var(--surface3)
        }

        .search-x {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-3);
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
            padding: 2px;
            display: none;
            transition: color var(--t);
        }

        .search-x:hover {
            color: var(--text-1)
        }

        .search-x.show {
            display: block
        }

        /* PORTAL DROPDOWN */
        #ac-portal {
            position: fixed;
            background: var(--surface2);
            border: 1px solid var(--border-focus);
            border-radius: var(--radius-md);
            max-height: 240px;
            overflow-y: auto;
            z-index: 9999;
            box-shadow: var(--shadow);
            display: none;
            min-width: 180px;
        }

        #ac-portal.open {
            display: block
        }

        .ac-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 13px;
            cursor: pointer;
            transition: background var(--t)
        }

        .ac-item:hover,
        .ac-item.hi {
            background: var(--surface3)
        }

        .ac-item img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            flex-shrink: 0;
            image-rendering: pixelated
        }

        .ac-item-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-1)
        }

        .ac-no-result,
        .ac-loading-msg {
            padding: 14px;
            text-align: center;
            font-size: 12px;
            color: var(--text-3)
        }

        /* SLOT ACTIONS */
        .slot-actions {
            margin-top: 9px;
            display: flex;
            gap: 6px
        }

        .slot-remove {
            background: var(--danger-dim);
            border: 1px solid transparent;
            border-radius: var(--radius-xs);
            padding: 5px 11px;
            font-size: 11px;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            color: var(--danger);
            cursor: pointer;
            transition: all var(--t);
            display: none;
        }

        .poke-slot.filled .slot-remove {
            display: inline-flex;
            align-items: center;
            gap: 4px
        }

        .slot-remove:hover {
            background: var(--danger);
            color: #fff
        }

        /* ANALYSIS */
        .analysis-wrap {
            margin-bottom: 16px
        }

        .synergy-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            margin-bottom: 14px
        }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.3px;
            color: var(--text-2);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 7px
        }

        .synergy-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px
        }

        @media(max-width:640px) {
            .synergy-stats {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        .syn-stat {
            background: var(--surface2);
            border-radius: var(--radius-md);
            padding: 13px 14px;
            text-align: center
        }

        .syn-val {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px
        }

        .syn-lbl {
            font-size: 10px;
            color: var(--text-3);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .6px
        }

        .balance-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            flex-wrap: wrap
        }

        .balance-lbl {
            font-size: 12px;
            color: var(--text-2);
            font-weight: 600
        }

        .balance-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700
        }

        .bal-excellent {
            background: var(--good-dim);
            color: var(--good);
            border: 1px solid var(--good-border)
        }

        .bal-good {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(90, 110, 255, 0.25)
        }

        .bal-moderate {
            background: var(--warn-dim);
            color: var(--warn);
            border: 1px solid var(--warn-border)
        }

        .bal-poor {
            background: var(--danger-dim);
            color: var(--danger);
            border: 1px solid var(--danger-border)
        }

        .insight-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px
        }

        .insight-chip {
            padding: 3px 9px;
            border-radius: 100px;
            font-size: 10.5px;
            font-weight: 700;
            background: var(--surface3);
            color: var(--text-2)
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px
        }

        @media(max-width:720px) {
            .analysis-grid {
                grid-template-columns: 1fr
            }
        }

        .analysis-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 22px
        }

        .coverage-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px
        }

        .cov-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 9px;
            border-radius: var(--radius-xs);
            background: var(--surface2);
            gap: 6px
        }

        .cov-item .type-badge {
            font-size: 9.5px;
            padding: 2px 7px
        }

        .cov-eff {
            font-size: 11px;
            font-weight: 700;
            font-family: 'Space Mono', monospace
        }

        .eff-super {
            color: var(--good)
        }

        .eff-neutral {
            color: var(--text-3)
        }

        .eff-resist {
            color: var(--warn)
        }

        .eff-zero {
            color: var(--danger)
        }

        .def-section {
            margin-bottom: 14px
        }

        .def-section:last-child {
            margin-bottom: 0
        }

        .def-label {
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px
        }

        .def-label.lbl-weak {
            color: var(--danger)
        }

        .def-label.lbl-resist {
            color: var(--good)
        }

        .def-label.lbl-immune {
            color: var(--immune)
        }

        .def-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px
        }

        .def-chip {
            display: inline-flex;

</head>

<body>

    <header class="header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-logo">⬡</div>

    <script>
        // ── TYPE DATA ─────────────────────────────────────────────────────────────────
        const TYPES = ['normal', 'fire', 'water', 'electric', 'grass', 'ice', 'fighting', 'poison',
            'ground', 'flying', 'psychic', 'bug', 'rock', 'ghost', 'dragon', 'dark', 'steel', 'fairy'];
        const TYPE_COLORS = {
            normal: '#9A9BAD', fire: '#F97B4B', water: '#5390DD', electric: '#EFC54A', grass: '#57A84C',
            ice: '#6ECECE', fighting: '#C03630', poison: '#AA45B2', ground: '#D9852F', flying: '#8D96E0',
            psychic: '#EE547A', bug: '#9DAE22', rock: '#BEA236', ghost: '#6863B1', dragon: '#5B64E8',
            dark: '#625468', steel: '#9B9FBA', fairy: '#D980A0'
        };
        const TYPE_CHART = {
            normal: { rock: .5, ghost: 0, steel: .5 },
            fire: { fire: .5, water: .5, rock: .5, dragon: .5, grass: 2, ice: 2, bug: 2, steel: 2 },
            water: { water: .5, grass: .5, dragon: .5, fire: 2, ground: 2, rock: 2 },
            electric: { electric: .5, grass: .5, dragon: .5, ground: 0, water: 2, flying: 2 },
            grass: { fire: .5, grass: .5, poison: .5, flying: .5, bug: .5, dragon: .5, steel: .5, water: 2, ground: 2, rock: 2 },
            ice: { fire: .5, water: .5, ice: .5, steel: .5, grass: 2, ground: 2, flying: 2, dragon: 2 },
            fighting: { poison: .5, flying: .5, psychic: .5, bug: .5, fairy: .5, ghost: 0, normal: 2, ice: 2, rock: 2, dark: 2, steel: 2 },
            poison: { poison: .5, ground: .5, rock: .5, ghost: .5, steel: 0, grass: 2, fairy: 2 },
            ground: { grass: .5, bug: .5, flying: 0, fire: 2, electric: 2, poison: 2, rock: 2, steel: 2 },
            flying: { electric: .5, rock: .5, steel: .5, grass: 2, fighting: 2, bug: 2 },
            psychic: { psychic: .5, steel: .5, dark: 0, fighting: 2, poison: 2 },
            bug: { fire: .5, fighting: .5, flying: .5, ghost: .5, steel: .5, fairy: .5, poison: .5, grass: 2, psychic: 2, dark: 2 },
            rock: { fighting: .5, ground: .5, steel: .5, fire: 2, ice: 2, flying: 2, bug: 2 },
            ghost: { normal: 0, dark: .5, psychic: 2, ghost: 2 },
            dragon: { steel: .5, fairy: 0, dragon: 2 },
            dark: { fighting: .5, dark: .5, fairy: .5, psychic: 2, ghost: 2 },
            steel: { fire: .5, water: .5, electric: .5, steel: .5, ice: 2, rock: 2, fairy: 2 },
            fairy: { fire: .5, poison: .5, steel: .5, fighting: 2, dragon: 2, dark: 2 }
        };
        function eff(atk, def) { const r = TYPE_CHART[atk]; return (r && r[def] !== undefined) ? r[def] : 1 }
        function defMult(atkType, types) { return types.reduce((a, t) => a * eff(atkType, t), 1) }

        // ── ABILITY EFFECTS ───────────────────────────────────────────────────────────
        // Maps ability slug → defensive modifiers it grants
        const ABILITY_EFFECTS = {
            'levitate': { immuneTo: ['ground'] },
            'flash-fire': { immuneTo: ['fire'] },
            'water-absorb': { immuneTo: ['water'] },
            'dry-skin': { immuneTo: ['water'], weakTo: ['fire'] },
            'storm-drain': { immuneTo: ['water'] },
            'volt-absorb': { immuneTo: ['electric'] },
            'lightning-rod': { immuneTo: ['electric'] },
            'motor-drive': { immuneTo: ['electric'] },
            'sap-sipper': { immuneTo: ['grass'] },
            'earth-eater': { immuneTo: ['ground'] },
            'wind-rider': { immuneTo: ['flying'] },
            'well-baked-body': { immuneTo: ['fire'] },
            'soundproof': { immuneTo: [] },   // blocks sound moves (not modelled by type)
            'thick-fat': { halvesFrom: ['fire', 'ice'] },
            'heatproof': { halvesFrom: ['fire'] },
            'water-bubble': { halvesFrom: ['fire'] },
            'fluffy': { doublesFrom: ['fire'] },
            'purifying-salt': { halvesFrom: ['ghost'] },
        };
        // Apply ability modifiers on top of base type effectiveness
        function getEffMult(atkType, pokemon) {
            let m = defMult(atkType, pokemon.types);
            const ab = pokemon.selectedAbility;
            if (ab && ABILITY_EFFECTS[ab]) {
                const fx = ABILITY_EFFECTS[ab];
                if (fx.immuneTo && fx.immuneTo.includes(atkType)) return 0;
                if (fx.halvesFrom && fx.halvesFrom.includes(atkType)) m *= 0.5;
                if (fx.doublesFrom && fx.doublesFrom.includes(atkType)) m *= 2;
                if (fx.weakTo && fx.weakTo.includes(atkType)) m *= 2;
            }
            return m;
        }

        // ── STATE ─────────────────────────────────────────────────────────────────────
        let team = Array(6).fill(null);
        let pokeList = [];
        let pokeCache = {};
        let moveCache = {};
        let listReady = false;
        let layout = 'grid';
        let saved = [];
        let panelOpen = false;

        // ── HELPERS ───────────────────────────────────────────────────────────────────
        function xid(url) { const p = url.replace(/\/$/, '').split('/'); return parseInt(p[p.length - 1], 10) }
        function fname(n) {
            const s = {
                'nidoran-m': 'Nidoran♂', 'nidoran-f': 'Nidoran♀', 'mr-mime': 'Mr. Mime', 'mr-rime': 'Mr. Rime',
                'mime-jr': 'Mime Jr.', 'porygon-z': 'Porygon-Z', 'ho-oh': 'Ho-Oh', 'type-null': 'Type: Null',
                'jangmo-o': 'Jangmo-o', 'hakamo-o': 'Hakamo-o', 'kommo-o': 'Kommo-o',
                'tapu-koko': 'Tapu Koko', 'tapu-lele': 'Tapu Lele', 'tapu-bulu': 'Tapu Bulu', 'tapu-fini': 'Tapu Fini',
                'great-tusk': 'Great Tusk', 'scream-tail': 'Scream Tail', 'brute-bonnet': 'Brute Bonnet',
                'flutter-mane': 'Flutter Mane', 'slither-wing': 'Slither Wing', 'sandy-shocks': 'Sandy Shocks',
                'iron-treads': 'Iron Treads', 'iron-bundle': 'Iron Bundle', 'iron-hands': 'Iron Hands',
                'iron-jugulis': 'Iron Jugulis', 'iron-moth': 'Iron Moth', 'iron-thorns': 'Iron Thorns',
                'roaring-moon': 'Roaring Moon', 'iron-valiant': 'Iron Valiant', 'walking-wake': 'Walking Wake',
                'iron-leaves': 'Iron Leaves', 'ting-lu': 'Ting-Lu', 'chien-pao': 'Chien-Pao',
                'wo-chien': 'Wo-Chien', 'chi-yu': 'Chi-Yu'
            };
            if (s[n]) return s[n];
            return n.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
        }
        function spr(id) { return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png` }
        function art(id) { return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png` }
        function tbadge(t) { return `<span class="type-badge" style="background:${TYPE_COLORS[t] || '#888'}">${t}</span>` }
        function fdate(ts) { return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) }
        function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5) }

        // ── API ───────────────────────────────────────────────────────────────────────
        async function loadList() {
            setPill('loading', 'Loading Pokédex…');
            const c = localStorage.getItem('ptb_list_v2');
            if (c) { try { pokeList = JSON.parse(c); listReady = true; setPill('ready', `${pokeList.length} Pokémon ready`); return } catch (e) { } }
            try {
                const r = await fetch('https://pokeapi.co/api/v2/pokemon?limit=2000&offset=0');
                if (!r.ok) throw 0;
                const d = await r.json();
                pokeList = d.results.map(p => ({ name: p.name, id: xid(p.url) }));
                listReady = true;
                localStorage.setItem('ptb_list_v2', JSON.stringify(pokeList));
                setPill('ready', `${pokeList.length} Pokémon ready`);
            } catch (e) {
                setPill('error', 'API unavailable');
                showToast('Failed to load Pokédex. Check your connection.', 'err');
            }
        }
        // Walk an evo-chain node and return all ancestor species names for targetName
        function findPreEvos(node, targetName, ancestors = []) {
            if (node.species.name === targetName) return ancestors;
            for (const next of node.evolves_to) {
                const result = findPreEvos(next, targetName, [...ancestors, node.species.name]);
                if (result !== null) return result;
            }
            return null;
        }
        // Fetch move names for a pokemon by name, using a lightweight per-species cache
        async function fetchMoveNames(pokeName) {
            const ck = `ptb_moves_${pokeName}`; const lc = localStorage.getItem(ck);
            if (lc) { try { return JSON.parse(lc); } catch (e) { } }
            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokeName}`);
            if (!r.ok) return [];
            const d = await r.json();
            const moves = d.moves.map(m => m.move.name);
            try { localStorage.setItem(ck, JSON.stringify(moves)); } catch (e) { }
            return moves;
        }
        async function getPoke(name) {
            if (pokeCache[name]) return pokeCache[name];
            const ck = `ptb_poke4_${name}`; const lc = localStorage.getItem(ck);
            if (lc) { try { const p = JSON.parse(lc); pokeCache[name] = p; return p } catch (e) { } }
            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${name}`);
            if (!r.ok) throw new Error('Not found: ' + name);
            const d = await r.json();

            // Start with own moves
            const allMoves = new Set(d.moves.map(m => m.move.name));

            // Fetch evolution chain and merge pre-evo moves
            try {
                const speciesRes = await fetch(d.species.url);
                const speciesData = await speciesRes.json();
                const chainRes = await fetch(speciesData.evolution_chain.url);
                const chainData = await chainRes.json();
                const preEvos = findPreEvos(chainData.chain, name) || [];
                const preEvoMoveLists = await Promise.all(preEvos.map(n => fetchMoveNames(n)));
                for (const list of preEvoMoveLists) { for (const mv of list) allMoves.add(mv); }
            } catch (e) { /* silently fall back to own moves only */ }

            const p = {
                name: d.name, id: d.id, types: d.types.map(t => t.type.name),
                artwork: d.sprites?.other?.['official-artwork']?.front_default || art(d.id),
                sprite: d.sprites?.front_default || spr(d.id),
                abilities: d.abilities.map(a => ({ name: a.ability.name, hidden: a.is_hidden })),
                moves: Array.from(allMoves).sort(),
                selectedAbility: d.abilities.find(a => !a.is_hidden)?.ability.name || d.abilities[0]?.ability.name || null,
                selectedMoves: [null, null, null, null],
            };
            pokeCache[name] = p;
            try { localStorage.setItem(ck, JSON.stringify(p)) } catch (e) { }
            return p;
        }
        async function getMoveData(moveName) {
            if (moveCache[moveName]) return moveCache[moveName];
            const ck = `ptb_move_${moveName}`; const lc = localStorage.getItem(ck);
            if (lc) { try { const m = JSON.parse(lc); moveCache[moveName] = m; return m; } catch (e) { } }
            const r = await fetch(`https://pokeapi.co/api/v2/move/${moveName}`);
            if (!r.ok) throw new Error('Move not found: ' + moveName);
            const d = await r.json();
            const m = { name: d.name, type: d.type.name, power: d.power, category: d.damage_class?.name };
            moveCache[moveName] = m;
            try { localStorage.setItem(ck, JSON.stringify(m)); } catch (e) { }
            return m;
        }

        // ── TEAM MANAGEMENT ───────────────────────────────────────────────────────────
        async function selectPoke(i, name) {
            showLoading(i, true); closePortal();
            try {
                const p = await getPoke(name);
                team[i] = p; saveTeam(); renderSlot(i); renderAnalysis(); updateCount(); updateSaveBtn();
            } catch (e) { showToast(`Could not load "${fname(name)}"`, 'err') }
            finally { showLoading(i, false) }
        }
        function removePoke(i) { team[i] = null; saveTeam(); renderSlot(i); renderAnalysis(); updateCount(); updateSaveBtn() }
        function clearTeam() { team = Array(6).fill(null); saveTeam(); renderGrid(); renderAnalysis(); updateCount(); updateSaveBtn() }

        // ── STORAGE — CURRENT TEAM ────────────────────────────────────────────────────
        function saveTeam() { localStorage.setItem('ptb_team_v2', JSON.stringify(team.map(p => p ? p.name : null))) }
        async function restoreTeam() {
            const s = localStorage.getItem('ptb_team_v2'); if (!s) return;
            let names; try { names = JSON.parse(s) } catch (e) { return }
            await Promise.all(names.map(async (n, i) => { if (n) try { team[i] = await getPoke(n) } catch (e) { } }));
            renderGrid(); renderAnalysis(); updateCount(); updateSaveBtn();
        }

        // ── STORAGE — SAVED TEAMS ─────────────────────────────────────────────────────
        function loadSaved() { try { saved = JSON.parse(localStorage.getItem('ptb_saved') || '[]') } catch (e) { saved = [] } }
        function writeSaved() { localStorage.setItem('ptb_saved', JSON.stringify(saved)) }

        // ── SAVE MODAL ────────────────────────────────────────────────────────────────
        function openSaveModal() {
            if (!team.filter(Boolean).length) { showToast('Add some Pokémon first!', 'err'); return }
            document.getElementById('modal-preview').innerHTML = team.map(p =>
                p ? `<div class="mprev"><img src="${p.sprite || spr(p.id)}" alt="${p.name}" onerror="this.src='${art(p.id)}'"></div>`
                    : `<div class="mprev empty"><div style="width:18px;height:18px;border-radius:50%;background:var(--border)"></div></div>`
            ).join('');
            const inp = document.getElementById('modal-input'); inp.value = '';
            document.getElementById('modal-backdrop').classList.add('open');
            setTimeout(() => inp.focus(), 230);
        }
        function closeModal() { document.getElementById('modal-backdrop').classList.remove('open') }
        function backdropClick(e) { if (e.target === document.getElementById('modal-backdrop')) closeModal() }
        function confirmSave() {
            const name = document.getElementById('modal-input').value.trim();
            if (!name) { showToast('Please enter a team name', 'err'); return }
            const entry = { id: uid(), name, date: Date.now(), pokemon: team.map(p => p ? p.name : null) };
            saved.unshift(entry); writeSaved();
            closeModal(); renderSaved(); updateBadge(); showToast(`"${name}" saved!`, 'ok');
        }
        document.getElementById('modal-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') confirmSave();
            if (e.key === 'Escape') closeModal();
        });

        async function loadSavedTeam(id) {
            const entry = saved.find(s => s.id === id); if (!entry) return;
            team = Array(6).fill(null);
            await Promise.all(entry.pokemon.map(async (n, i) => { if (n) try { team[i] = await getPoke(n) } catch (e) { } }));
            saveTeam(); renderGrid(); renderAnalysis(); updateCount(); updateSaveBtn();
            showToast(`Loaded "${entry.name}"`, 'ok');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function deleteSaved(id) {
            const idx = saved.findIndex(s => s.id === id); if (idx === -1) return;
            const name = saved[idx].name;
            saved.splice(idx, 1); writeSaved(); renderSaved(); updateBadge();
            showToast(`"${name}" deleted`, 'ok');
        }

        // ── SAVED PANEL ───────────────────────────────────────────────────────────────
        function toggleSaved() {
            panelOpen = !panelOpen;
            document.getElementById('saved-toggle').classList.toggle('open', panelOpen);
            document.getElementById('saved-body').classList.toggle('open', panelOpen);
            if (panelOpen) renderSaved();
        }
        function renderSaved() {
            const el = document.getElementById('saved-inner');
            if (!saved.length) {
                el.innerHTML = `<div class="saved-empty">No saved teams yet.<br>Build a team and hit <strong>Save Team</strong> to keep it here.</div>`;
                return;
            }
            el.innerHTML = `<div class="saved-grid">${saved.map(e => {
                const sprites = e.pokemon.map(n => {
                    if (!n) return `<div class="saved-sprite-wrap empty"><div style="width:8px;height:8px;border-radius:50%;background:var(--text-3)"></div></div>`;
                    const c = pokeCache[n]; const pl = pokeList.find(p => p.name === n);
                    const src = c ? c.sprite : (pl ? spr(pl.id) : '');
                    return `<div class="saved-sprite-wrap"><img src="${src}" alt="${n}" onerror="this.style.opacity=.1"></div>`;
                }).join('');
                return `<div class="saved-card">
      <div class="saved-card-name" title="${e.name}">${e.name}</div>
      <div class="saved-card-date">${fdate(e.date)}</div>
      <div class="saved-sprites">${sprites}</div>
      <div class="saved-card-actions">
        <button class="saved-load" onclick="loadSavedTeam('${e.id}')">Load Team</button>
        <button class="saved-delete" onclick="deleteSaved('${e.id}')" title="Delete">✕</button>
      </div>
    </div>`;
            }).join('')}</div>`;
        }
        function updateBadge() {
            const el = document.getElementById('saved-badge');
            if (el) el.textContent = saved.length;
        }

        // ── LAYOUT ────────────────────────────────────────────────────────────────────
        function setLayout(mode) {
            layout = mode;
            localStorage.setItem('ptb_layout', mode);
            document.getElementById('lt-grid').classList.toggle('active', mode === 'grid');
            document.getElementById('lt-list').classList.toggle('active', mode === 'list');
            renderGrid();
        }

        // ── RENDER ────────────────────────────────────────────────────────────────────
        function renderGrid() {
            const g = document.getElementById('team-grid');
            g.innerHTML = '';
            g.classList.toggle('layout-list', layout === 'list');
            for (let i = 0; i < 6; i++) {
                const d = document.createElement('div');
                d.className = 'poke-slot' + (team[i] ? ' filled' : '');
                d.dataset.slot = i;
                d.innerHTML = slotHTML(i);
                g.appendChild(d);
                wireSlot(i);
            }
        }
        function renderSlot(i) {
            const el = document.querySelector(`.poke-slot[data-slot="${i}"]`); if (!el) return;
            el.className = 'poke-slot' + (team[i] ? ' filled' : '');
            el.innerHTML = slotHTML(i); wireSlot(i);
        }
        function slotHTML(i) {
            const p = team[i];
            const img = p ? `<img class="poke-sprite" src="${p.artwork || art(p.id)}" alt="${p.name}" onerror="this.src='${spr(p.id)}'" loading="lazy">` : `<span class="slot-empty-icon">⬡</span>`;
            const types = p ? p.types.map(tbadge).join('') : '';
            const name = p ? fname(p.name) : `<span style="color:var(--text-3);font-size:13px;font-weight:500">Empty Slot</span>`;
            const loader = `<div class="slot-loading-overlay" id="ld-${i}" style="display:none"><div class="spinner"></div></div>`;
            const search = `<div class="search-wrap" id="sw-${i}"><input class="search-input" id="si-${i}" type="text" placeholder="${p ? 'Change Pokémon…' : 'Search Pokémon…'}" autocomplete="off" spellcheck="false"><button class="search-x" id="sx-${i}" onclick="clearSearch(${i})">×</button></div>`;
            const actions = `<div class="slot-actions"><button class="slot-remove" onclick="removePoke(${i})"><span style="font-size:13px">×</span> Remove</button></div>`;
            const spriteArea = `<div class="sprite-area"><div class="sprite-ring"></div>${img}${loader}</div>`;

            // Ability & Moves section (only shown when slot is filled)
            const abilitySection = p ? `
<div class="poke-detail-section">
  <div class="detail-label">Ability</div>
  <select class="ability-select" id="ab-${i}" onchange="setAbility(${i}, this.value)">
    ${(p.abilities || []).map(a => `<option value="${a.name}" ${p.selectedAbility === a.name ? 'selected' : ''}>${fname(a.name)}${a.hidden ? ' ✦' : ''}</option>`).join('')}
  </select>
</div>
<div class="poke-detail-section">
  <div class="detail-label">Moves <span style="opacity:.45;font-weight:500;text-transform:none;letter-spacing:0">(affects coverage)</span></div>
  <div class="moves-grid">
    ${[0, 1, 2, 3].map(mi => {
                const sm = p.selectedMoves && p.selectedMoves[mi];
                const dotColor = sm && sm.type ? (TYPE_COLORS[sm.type] || '#888') : 'transparent';
                return `<div class="move-wrap">
        <input class="move-input${sm ? ' has-move' : ''}" id="mv-${i}-${mi}" type="text" placeholder="Move ${mi + 1}" value="${sm ? fname(sm.name) : ''}" autocomplete="off" spellcheck="false">
        <span class="move-type-dot" id="mvd-${i}-${mi}" style="background:${dotColor};opacity:${sm ? 1 : 0}"></span>
        <button class="move-clear-btn" id="mvc-${i}-${mi}" onclick="clearMove(${i},${mi})" title="Clear move">×</button>
      </div>`;
            }).join('')}
  </div>
</div>` : '';

            if (layout === 'list') return `${spriteArea}
    <div class="slot-body">
      <div class="slot-main-info">
        <div class="slot-num">SLOT ${String(i + 1).padStart(2, '0')}</div>
        <div class="slot-name">${name}</div>
        <div class="slot-types">${types}</div>
      </div>
      <div class="slot-search-col">${search}${actions}${abilitySection}</div>
    </div>`;

            return `${spriteArea}
    <div class="slot-body">
      <div class="slot-num">SLOT ${String(i + 1).padStart(2, '0')}</div>
      <div class="slot-name">${name}</div>
      <div class="slot-types">${types}</div>
      ${search}${actions}${abilitySection}
    </div>`;
        }

        // ── SLOT EVENTS ───────────────────────────────────────────────────────────────
        function wireSlot(i) {
            const inp = document.getElementById(`si-${i}`);
            const xb = document.getElementById(`sx-${i}`);
            if (!inp) return;
            inp.addEventListener('input', () => {
                const q = inp.value.trim();
                xb.classList.toggle('show', q.length > 0);
                q.length ? showPortal(i, q) : closePortal();
            });
            inp.addEventListener('focus', () => { const q = inp.value.trim(); if (q) showPortal(i, q) });
            inp.addEventListener('blur', () => setTimeout(() => { if (portalSlot === i) closePortal() }, 150));
            inp.addEventListener('keydown', e => {
                const items = portal.querySelectorAll('.ac-item');
                if (e.key === 'ArrowDown') { e.preventDefault(); hMove(items, 1) }
                else if (e.key === 'ArrowUp') { e.preventDefault(); hMove(items, -1) }
                else if (e.key === 'Enter') { e.preventDefault(); const h = portal.querySelector('.ac-item.hi'); if (h) { selectPoke(i, h.dataset.name); clearSearch(i) } }
                else if (e.key === 'Escape') closePortal();
            });
            // Wire move inputs (only for filled slots)
            if (team[i]) {
                [0, 1, 2, 3].forEach(mi => {
                    const mv = document.getElementById(`mv-${i}-${mi}`);
                    if (!mv) return;
                    mv.addEventListener('input', () => {
                        const q = mv.value.trim();
                        q.length >= 2 ? showMovePortal(i, mi, q) : closeMovePortal();
                    });
                    mv.addEventListener('focus', () => {
                        const q = mv.value.trim();
                        if (q.length >= 2) showMovePortal(i, mi, q);
                        else if (team[i] && team[i].moves && team[i].moves.length) showMovePortal(i, mi, '');
                    });
                    mv.addEventListener('blur', () => setTimeout(() => {
                        if (movePortalSlot === i && movePortalIdx === mi) closeMovePortal();
                    }, 180));
                    mv.addEventListener('keydown', e => {
                        const items = movePortal.querySelectorAll('.ac-move-item');
                        if (e.key === 'ArrowDown') { e.preventDefault(); hMove(items, 1); }
                        else if (e.key === 'ArrowUp') { e.preventDefault(); hMove(items, -1); }
                        else if (e.key === 'Enter') { e.preventDefault(); const h = movePortal.querySelector('.ac-move-item.hi'); if (h) { selectMove(i, mi, h.dataset.name); closeMovePortal(); } }
                        else if (e.key === 'Escape') closeMovePortal();
                    });
                });
            }
        }
        function clearSearch(i) {
            const inp = document.getElementById(`si-${i}`); const xb = document.getElementById(`sx-${i}`);
            if (inp) { inp.value = ''; inp.focus() } if (xb) xb.classList.remove('show'); closePortal();
        }
        function hMove(items, dir) {
            let cur = -1; items.forEach((el, idx) => { if (el.classList.contains('hi')) cur = idx });
            items.forEach(el => el.classList.remove('hi'));
            let n = cur + dir; if (n < 0) n = items.length - 1; if (n >= items.length) n = 0;
            if (items[n]) { items[n].classList.add('hi'); items[n].scrollIntoView({ block: 'nearest' }) }
        }

        // ── PORTAL DROPDOWN ───────────────────────────────────────────────────────────
        let portalSlot = -1;
        const portal = document.getElementById('ac-portal');

        function showPortal(idx, q) {
            const inp = document.getElementById(`si-${idx}`); if (!inp) return;
            portalSlot = idx; portal.classList.add('open'); posPortal(inp);
            if (!listReady) { portal.innerHTML = '<div class="ac-loading-msg">Loading Pokédex…</div>'; return }
            const ql = q.toLowerCase();
            const st = pokeList.filter(p => p.name.startsWith(ql));
            const co = pokeList.filter(p => !p.name.startsWith(ql) && p.name.includes(ql));
            const res = [...st, ...co].slice(0, 9);
            if (!res.length) { portal.innerHTML = '<div class="ac-no-result">No Pokémon found</div>'; return }
            portal.innerHTML = res.map(p => `<div class="ac-item" data-name="${p.name}"><img src="${spr(p.id)}" alt="${p.name}" onerror="this.style.opacity=0"><span class="ac-item-name">${fname(p.name)}</span></div>`).join('');
            portal.querySelectorAll('.ac-item').forEach(el => {
                el.addEventListener('mousedown', e => { e.preventDefault(); selectPoke(idx, el.dataset.name); clearSearch(idx) });
            });
        }
        function posPortal(inp) {
            const r = inp.getBoundingClientRect();
            portal.style.left = r.left + 'px'; portal.style.top = (r.bottom + 5) + 'px'; portal.style.width = r.width + 'px';
        }
        function closePortal() { portal.classList.remove('open'); portalSlot = -1 }

        document.addEventListener('mousedown', e => {
            if (!e.target.closest('.search-wrap') && !e.target.closest('#ac-portal')) closePortal();
            if (!e.target.closest('.move-wrap') && !e.target.closest('#move-portal')) closeMovePortal();
        });
        window.addEventListener('scroll', () => {
            if (portalSlot >= 0) { const inp = document.getElementById(`si-${portalSlot}`); inp ? posPortal(inp) : closePortal() }
            if (movePortalSlot >= 0) { const mv = document.getElementById(`mv-${movePortalSlot}-${movePortalIdx}`); mv ? posMovePortal(mv) : closeMovePortal(); }
        }, true);
        window.addEventListener('resize', () => { if (portalSlot >= 0) closePortal(); if (movePortalSlot >= 0) closeMovePortal(); });

        // ── MOVE PORTAL ───────────────────────────────────────────────────────────────
        let movePortalSlot = -1, movePortalIdx = -1;
        const movePortal = document.getElementById('move-portal');

        function moveBadgeHTML(mn) {
            const cached = moveCache[mn];
            if (cached) {
                const color = TYPE_COLORS[cached.type] || '#888';
                return `<span class="ac-move-type-badge" style="background:${color}" data-badge="${mn}">${cached.type}</span>`;
            }
            return `<span class="ac-move-type-badge unknown" data-badge="${mn}">…</span>`;
        }
        let moveTypeFetchAbort = null;
        function showMovePortal(i, mi, q) {
            const mv = document.getElementById(`mv-${i}-${mi}`); if (!mv || !team[i]) return;
            movePortalSlot = i; movePortalIdx = mi;
            movePortal.classList.add('open'); posMovePortal(mv);
            const ql = q.toLowerCase().replace(/\s+/g, '-');
            const moves = team[i].moves || [];
            const filtered = ql.length >= 2
                ? [...moves.filter(m => m.startsWith(ql)), ...moves.filter(m => !m.startsWith(ql) && m.includes(ql))]
                : [...moves];
            if (!filtered.length) { movePortal.innerHTML = '<div class="ac-no-result">No moves found</div>'; return; }
            movePortal.innerHTML = filtered.map(mn =>
                `<div class="ac-move-item" data-name="${mn}">${moveBadgeHTML(mn)}<span>${fname(mn)}</span></div>`
            ).join('');
            movePortal.querySelectorAll('.ac-move-item').forEach(el => {
                el.addEventListener('mousedown', e2 => { e2.preventDefault(); selectMove(i, mi, el.dataset.name); closeMovePortal(); });
            });
            // Batch-fetch types for uncached moves, then update badges in-place
            const uncached = filtered.filter(m => !moveCache[m]);
            if (uncached.length) batchFetchMoveTypes(uncached);
        }
        async function batchFetchMoveTypes(moveNames) {
            const BATCH = 6;
            for (let idx = 0; idx < moveNames.length; idx += BATCH) {
                if (movePortalSlot < 0) break; // portal closed, stop
                const batch = moveNames.slice(idx, idx + BATCH);
                await Promise.all(batch.map(async mn => {
                    try {
                        await getMoveData(mn);
                        // Update badge in-place if portal still shows this move
                        const badge = movePortal.querySelector(`[data-badge="${mn}"]`);
                        if (badge && moveCache[mn]) {
                            const color = TYPE_COLORS[moveCache[mn].type] || '#888';
                            badge.textContent = moveCache[mn].type;
                            badge.style.background = color;
                            badge.classList.remove('unknown');
                        }
                    } catch (e) { }
                }));
                if (idx + BATCH < moveNames.length) await new Promise(r => setTimeout(r, 40));
            }
        }
        function posMovePortal(inp) {
            const r = inp.getBoundingClientRect();
            movePortal.style.left = r.left + 'px'; movePortal.style.top = (r.bottom + 3) + 'px';
            movePortal.style.width = Math.max(r.width, 180) + 'px';
        }
        function closeMovePortal() { movePortal.classList.remove('open'); movePortalSlot = -1; movePortalIdx = -1; }

        async function selectMove(i, mi, moveName) {
            if (!team[i]) return;
            if (!team[i].selectedMoves) team[i].selectedMoves = [null, null, null, null];
            try {
                const md = await getMoveData(moveName);
                team[i].selectedMoves[mi] = { name: moveName, type: md.type };
                const inp = document.getElementById(`mv-${i}-${mi}`);
                const dot = document.getElementById(`mvd-${i}-${mi}`);
                const clr = document.getElementById(`mvc-${i}-${mi}`);
                if (inp) { inp.value = fname(moveName); inp.classList.add('has-move'); }
                if (dot) { dot.style.background = TYPE_COLORS[md.type] || '#888'; dot.style.opacity = '1'; }
                if (clr) clr.style.display = 'block';
                // Update portal dots if open
                movePortal.querySelectorAll('.ac-move-item').forEach(el => {
                    if (!el.querySelector('.ac-move-type-dot') && moveCache[el.dataset.name]) {
                        const d = document.createElement('span');
                        d.className = 'ac-move-type-dot'; d.style.background = TYPE_COLORS[moveCache[el.dataset.name].type] || '#888';
                        el.prepend(d);
                    }
                });
                renderAnalysis();
            } catch (e) { showToast(`Could not load move "${fname(moveName)}"`, 'err'); }
        }
        function clearMove(i, mi) {
            if (!team[i] || !team[i].selectedMoves) return;
            team[i].selectedMoves[mi] = null;
            const inp = document.getElementById(`mv-${i}-${mi}`);
            const dot = document.getElementById(`mvd-${i}-${mi}`);
            const clr = document.getElementById(`mvc-${i}-${mi}`);
            if (inp) { inp.value = ''; inp.classList.remove('has-move'); inp.focus(); }
            if (dot) { dot.style.opacity = '0'; }
            if (clr) clr.style.display = 'none';
            renderAnalysis();
        }
        function setAbility(i, abilityName) {
            if (!team[i]) return;
            team[i].selectedAbility = abilityName;
            renderAnalysis();
        }

        // ── UI HELPERS ────────────────────────────────────────────────────────────────
        function showLoading(i, v) { const el = document.getElementById(`ld-${i}`); if (el) el.style.display = v ? 'flex' : 'none' }
        function updateCount() { const n = team.filter(Boolean).length; const el = document.getElementById('team-count'); if (el) el.textContent = `${n} / 6` }
        function updateSaveBtn() { const btn = document.getElementById('btn-save'); if (btn) btn.disabled = !team.filter(Boolean).length }
        let toastT;
        function showToast(msg, type = 'ok') {
            const el = document.getElementById('toast'); if (!el) return;
            el.textContent = msg; el.className = `toast show ${type}`;
            clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 3200);
        }
        function setPill(s, m) { const el = document.getElementById('api-pill'); if (!el) return; el.className = `api-pill ${s}`; el.textContent = m }
        function toggleTheme() {
            const html = document.documentElement, dark = html.dataset.theme === 'dark';
            html.dataset.theme = dark ? 'light' : 'dark';
            document.getElementById('theme-icon').textContent = dark ? '☽' : '☀';
            document.getElementById('theme-lbl').textContent = dark ? 'Dark' : 'Light';
            localStorage.setItem('ptb_theme', dark ? 'light' : 'dark');
        }

        // ── ANALYSIS ─────────────────────────────────────────────────────────────────
        function teamHasMoves() {
            return team.filter(Boolean).some(p => p.selectedMoves && p.selectedMoves.some(m => m && m.type));
        }
        function analyzeOff() {
            const f = team.filter(Boolean); if (!f.length) return null;
            // Collect attacking types: use move types for pokemon that have moves selected, else fall back to pokemon types
            const atkTypes = new Set();
            for (const p of f) {
                const activeMoves = (p.selectedMoves || []).filter(m => m && m.type);
                if (activeMoves.length > 0) { for (const m of activeMoves) atkTypes.add(m.type); }
                else { for (const t of p.types) atkTypes.add(t); }
            }
            const res = {};
            for (const d of TYPES) { let best = 0, ba = null; for (const a of atkTypes) { const e = eff(a, d); if (e > best) { best = e; ba = a } } res[d] = { mult: best, atk: ba } }
            return res;
        }
        function analyzeDef() {
            const f = team.filter(Boolean); if (!f.length) return null;
            const res = {};
            for (const a of TYPES) {
                const c = { immune: 0, quadResist: 0, resist: 0, neutral: 0, weak: 0, quadWeak: 0 };
                for (const p of f) {
                    const m = getEffMult(a, p);
                    if (m === 0) c.immune++; else if (m <= .25) c.quadResist++; else if (m < 1) c.resist++;
                    else if (m >= 4) c.quadWeak++; else if (m >= 2) c.weak++; else c.neutral++;
                }
                res[a] = c;
            }
            return res;
        }
        function calcBal(o, d) {
            if (!o || !d) return null;
            let gaps = 0; for (const t of TYPES) { if (o[t].mult < 2) gaps++ }
            let mw = 0; for (const t of TYPES) { const c = d[t]; if ((c.weak + c.quadWeak) >= 3) mw++ }
            let sc = Math.max(0, Math.min(100, 100 - gaps * 4 - mw * 12));
            let lv, cl;
            if (sc >= 80) { lv = 'Excellent'; cl = 'bal-excellent' }
            else if (sc >= 60) { lv = 'Good'; cl = 'bal-good' }
            else if (sc >= 40) { lv = 'Moderate'; cl = 'bal-moderate' }
            else { lv = 'Poor'; cl = 'bal-poor' }
            return { score: sc, gaps, mw, lv, cl };
        }
        function renderAnalysis() {
            const root = document.getElementById('analysis-root');
            const f = team.filter(Boolean);
            if (!f.length) { root.innerHTML = `<div class="analysis-empty"><div class="analysis-empty-icon">⬡</div>Add Pokémon to your team to see type analysis</div>`; return }
            const o = analyzeOff(), d = analyzeDef(), b = calcBal(o, d);
            const gapNames = TYPES.filter(t => o[t].mult < 2).map(fname);
            const sup = TYPES.filter(t => o[t].mult >= 2).length;
            const weak = TYPES.filter(t => (d[t].weak + d[t].quadWeak) > 0).sort((a, b) => (d[b].weak + d[b].quadWeak) - (d[a].weak + d[a].quadWeak));
            const res = TYPES.filter(t => (d[t].resist + d[t].quadResist) > 0).sort((a, b) => (d[b].resist + d[b].quadResist) - (d[a].resist + d[a].quadResist));
            const imm = TYPES.filter(t => d[t].immune > 0);
            const dot = (t) => `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${TYPE_COLORS[t] || '#888'};flex-shrink:0"></span>`;
            const hasMoves = teamHasMoves();
            // Check if any ability has known effects
            const hasAbilityFx = f.some(p => p.selectedAbility && ABILITY_EFFECTS[p.selectedAbility]);
            const modeTags = [];
            if (hasMoves) modeTags.push(`<span class="analysis-mode-tag">⚔ Move-based coverage</span>`);
            if (hasAbilityFx) modeTags.push(`<span class="analysis-mode-tag" style="background:var(--good-dim);color:var(--good);border-color:var(--good-border)">🛡 Ability effects active</span>`);
            root.innerHTML = `
  <div class="section-header" style="margin-top:4px">
    <div class="section-label">Analysis</div>
    ${modeTags.length ? `<div style="display:flex;gap:6px;flex-wrap:wrap">${modeTags.join('')}</div>` : ''}
  </div>
  <div class="analysis-wrap">
    <div class="synergy-card">
      <div class="card-title">◎ Team Synergy</div>
      <div class="synergy-stats">
        <div class="syn-stat"><div class="syn-val">${f.length}</div><div class="syn-lbl">Pokémon</div></div>
        <div class="syn-stat"><div class="syn-val" style="color:var(--good)">${sup}</div><div class="syn-lbl">${hasMoves ? 'Move Coverage' : 'Types Covered'}</div></div>
        <div class="syn-stat"><div class="syn-val" style="color:${b.gaps > 5 ? 'var(--danger)' : b.gaps > 2 ? 'var(--warn)' : 'var(--good)'}">${b.gaps}</div><div class="syn-lbl">Coverage Gaps</div></div>
        <div class="syn-stat"><div class="syn-val" style="color:${b.mw > 3 ? 'var(--danger)' : b.mw > 1 ? 'var(--warn)' : 'var(--good)'}">${b.mw}</div><div class="syn-lbl">Major Weaknesses</div></div>
      </div>
      <div class="balance-row">
        <span class="balance-lbl">Overall Balance:</span>
        <span class="balance-badge ${b.cl}">● ${b.lv}</span>
        <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text-3)">${b.score}/100</span>
      </div>
      ${b.gaps > 0 ? `<div class="insight-row"><span style="font-size:11px;color:var(--text-3)">Gaps:</span>${gapNames.slice(0, 9).map(g => `<span class="insight-chip">${g}</span>`).join('')}${gapNames.length > 9 ? `<span class="insight-chip">+${gapNames.length - 9}</span>` : ''}</div>` : ''}
      ${!hasMoves ? `<div style="font-size:10.5px;color:var(--text-3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">💡 Add moves to each Pokémon for accurate offensive coverage analysis</div>` : ''}
    </div>
    <div class="analysis-grid">
      <div class="analysis-card">
        <div class="card-title">⚔ Offensive Coverage <span style="font-size:9px;opacity:.5;font-weight:500;text-transform:none;letter-spacing:0">${hasMoves ? 'via moves' : 'via types'}</span></div>
        <div class="coverage-grid">
          ${TYPES.map(t => { const { mult } = o[t]; let cl, lb; if (mult >= 4) { cl = 'eff-super'; lb = '4×' } else if (mult >= 2) { cl = 'eff-super'; lb = '2×' } else if (mult === 1) { cl = 'eff-neutral'; lb = '1×' } else if (mult > 0) { cl = 'eff-resist'; lb = '½×' } else { cl = 'eff-zero'; lb = '—' }; return `<div class="cov-item"><span class="type-badge" style="background:${TYPE_COLORS[t] || '#888'}">${t}</span><span class="cov-eff ${cl}">${lb}</span></div>` }).join('')}
        </div>
      </div>
      <div class="analysis-card">
        <div class="card-title">🛡 Defensive Analysis <span style="font-size:9px;opacity:.5;font-weight:500;text-transform:none;letter-spacing:0">${hasAbilityFx ? 'w/ abilities' : ''}</span></div>
        <div class="def-section">
          <div class="def-label lbl-weak">⬤ Weak To</div>
          <div class="def-chips">
            ${weak.length ? weak.map(t => `<div class="def-chip chip-weak">${dot(t)}<span style="color:var(--text-1)">${fname(t)}</span><span class="chip-count">×${d[t].weak + d[t].quadWeak}</span></div>`).join('') : '<div class="def-empty">No shared weaknesses</div>'}
          </div>
        </div>
        <div class="def-section">
          <div class="def-label lbl-resist">⬤ Resistant To</div>
          <div class="def-chips">
            ${res.length ? res.map(t => `<div class="def-chip chip-resist">${dot(t)}<span style="color:var(--text-1)">${fname(t)}</span><span class="chip-count">×${d[t].resist + d[t].quadResist}</span></div>`).join('') : '<div class="def-empty">No resistances</div>'}
          </div>
        </div>
        ${imm.length ? `<div class="def-section"><div class="def-label lbl-immune">⬤ Immune To</div><div class="def-chips">${imm.map(t => `<div class="def-chip chip-immune">${dot(t)}<span style="color:var(--text-1)">${fname(t)}</span><span class="chip-count">×${d[t].immune}</span></div>`).join('')}</div></div>` : ''}
      </div>
    </div>
  </div>`;
        }

        // ── INIT ──────────────────────────────────────────────────────────────────────
        async function init() {
            const th = localStorage.getItem('ptb_theme');
            if (th) { document.documentElement.dataset.theme = th; if (th === 'light') { document.getElementById('theme-icon').textContent = '☽'; document.getElementById('theme-lbl').textContent = 'Dark' } }
            const la = localStorage.getItem('ptb_layout') || 'grid';
            layout = la;
            document.getElementById('lt-grid').classList.toggle('active', la === 'grid');
            document.getElementById('lt-list').classList.toggle('active', la === 'list');
            document.getElementById('team-grid').classList.toggle('layout-list', la === 'list');
            loadSaved(); updateBadge();
            renderGrid(); renderAnalysis();
            await loadList();
            await restoreTeam();
        }
        init();
    </script>
</body>

</html>
